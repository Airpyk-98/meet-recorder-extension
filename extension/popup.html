<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetRecorder AI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="popup-body">
    <div class="glass-container">
        <header>
            <div class="logo">
                <div class="recording-dot"></div>
                <h1>MeetRecorder AI</h1>
            </div>
            <p class="subtitle">Cloud Recording Engine</p>
        </header>

        <main>
            <div id="status-container" class="status idle">
                <span id="status-text">Ready to Record</span>
            </div>

            <div class="actions">
                <button id="record-btn" class="primary-btn pulse-on-hover">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="12" r="3" fill="currentColor"></circle>
                    </svg>
                    Start Recording
                </button>
            </div>
            
            <div class="settings">
                <label for="hf-url">Hugging Face Space URL:</label>
                <input type="text" id="hf-url" placeholder="https://EPIC98-meet-recorder.hf.space" />
            </div>
        </main>

        <footer>
            <button id="dashboard-btn" class="secondary-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                    <path d="M3 9h18"></path>
                    <path d="M9 21V9"></path>
                </svg>
                Open Dashboard
            </button>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
